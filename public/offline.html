<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — NeoRoutine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(to bottom, #eff6ff, #ffffff);
      color: #334155;
      padding: 1rem;
    }
    .container { text-align: center; max-width: 28rem; }
    .icon {
      width: 5rem; height: 5rem; margin: 0 auto 1.5rem;
      color: #93c5fd; opacity: 0.8;
    }
    h1 { font-size: 1.5rem; font-weight: 700; color: #2563eb; margin-bottom: 0.5rem; }
    p  { font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; color: #64748b; }
    button {
      display: inline-block; padding: 0.625rem 1.5rem;
      background: #3b82f6; color: #fff; border: none; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
    button:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="container" role="alert">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
    </svg>
    <h1>You&rsquo;re Offline</h1>
    <p>It looks like you&rsquo;ve lost your internet connection. NeoRoutine needs a network to sync your habits and progress.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
